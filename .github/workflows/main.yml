name: Build Android Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Create Android Structure
        run: flutter create --platforms=android --force .

      - name: Force Write Correct pubspec.yaml
        run: |
          cat << 'EOF' > pubspec.yaml
          name: vehicle_ai_app
          description: Professional AI Vehicle Inspection App
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            http: ^1.2.0
            image_picker: ^1.0.7
            shared_preferences: ^2.2.2

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      - name: Fix Android minSdkVersion for Camera/ImagePicker
        run: |
          sed -i 's/minSdkVersion.*/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion =.*/minSdkVersion = 21/g' android/app/build.gradle || true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --dart-define=OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vehicle-AI-Inspector-v1.0
          path: build/app/outputs/flutter-apk/app-release.apk
